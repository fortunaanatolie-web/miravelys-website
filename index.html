<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f7f3ed" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#060b1d" media="(prefers-color-scheme: dark)" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Miravelys. Find focus, calm your mind, and reclaim your time with an elegant, immersive wellness companion." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://miravelys.com/" />
    <meta property="og:title" content="Miravelys — Reclaim Your Time" />
    <meta property="og:description" content="Find focus, calm your mind, and reclaim your time with an elegant, immersive wellness companion." />
    <meta property="og:image" content="https://miravelys.com/og-image.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://miravelys.com/" />
    <meta name="twitter:title" content="Miravelys — Reclaim Your Time" />
    <meta name="twitter:description" content="Find focus, calm your mind, and reclaim your time with an elegant, immersive wellness companion." />
    <meta name="twitter:image" content="https://miravelys.com/og-image.jpg" />

    <!-- Apple Smart App Banner & Web App -->
    <meta name="apple-itunes-app" content="app-id=123456789" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>
      (function () {
        var saved = localStorage.getItem('miravelys.appearance');
        var hour = new Date().getHours();
        var timeDay = hour >= 6 && hour < 19;
        var light = window.matchMedia('(prefers-color-scheme: light)').matches;
        var dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var mode =
          saved === 'day' || saved === 'evening'
            ? saved
            : light && !dark
              ? 'day'
              : dark && !light
                ? 'evening'
                : timeDay
                  ? 'day'
                  : 'evening';
        document.documentElement.dataset.appearance = mode;
        document.documentElement.style.colorScheme = mode === 'day' ? 'light' : 'dark';
      })();
    </script>
    <title>Miravelys</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
